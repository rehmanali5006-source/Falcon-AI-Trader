name: Falcon AI Trader Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Files
        run: |
          pwd
          ls -R

      - name: Show app.py
        run: |
          cat app.py

      - name: Show market.py
        run: |
          cat scanner/market.py

      - name: Run Bot
        run: |
          python app.py
